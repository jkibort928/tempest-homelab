[main]
summary=Optimize for headless Tiger Lake server stability while capping package power to 15W

[cpu]
# Use the powersave governor as the baseline for the intel_pstate driver
governor=powersave
# Use EPP balance_power to prevent aggressive turbo spikes during ML tasks
energy_performance_preference=balance_power

[sysfs]
# Cap Long-Term Power Limit (PL1) to 15 Watts (15000000 microwatts)
/sys/class/powercap/intel-rapl:0/constraint_0_power_limit_uw=15000000

# Cap Short-Term Power Limit (PL2) to 18 Watts (18000000 microwatts)
/sys/class/powercap/intel-rapl:0/constraint_1_power_limit_uw=18000000
